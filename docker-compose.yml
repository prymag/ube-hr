version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: ube-hr-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ube_hr}
      MYSQL_USER: ${MYSQL_USER:-ube_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-ube_password}
    ports:
      - '${MYSQL_PORT:-3306}:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ube-hr-network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: ube-hr-phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_USER: ${MYSQL_USER:-ube_user}
      PMA_PASSWORD: ${MYSQL_PASSWORD:-ube_password}
      PMA_PORT: 3306
    ports:
      - '${PHPMYADMIN_PORT:-8080}:80'
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - ube-hr-network

  mailhog:
    image: mailhog/mailhog:latest
    container_name: ube-hr-mailhog
    ports:
      - '${MAILHOG_SMTP_PORT:-1025}:1025'
      - '${MAILHOG_UI_PORT:-8025}:8025'
    networks:
      - ube-hr-network

volumes:
  mysql_data:

networks:
  ube-hr-network:
    driver: bridge
