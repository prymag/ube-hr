openapi: 3.0.3
info:
  title: UBE HR API
  description: |
    JWT-based authentication and user management API for UBE HR Management System.

    ## Authentication
    All protected endpoints require a Bearer JWT access token in the `Authorization` header.

    ## Roles
    - `SYSTEM_ADMIN` — full access; can manage all users and roles
    - `ADMIN` — can manage USER accounts only; cannot assign elevated roles
    - `USER` — read-only; no user management access
  version: 1.0.0
  contact:
    name: UBE HR Team

servers:
  - url: http://localhost:3000/api/v1
    description: Local development server

tags:
  - name: Auth
    description: Authentication endpoints (login, refresh, logout, profile)
  - name: Users
    description: User management endpoints (ADMIN / SYSTEM_ADMIN only)

# ─── Security scheme ─────────────────────────────────────────────────────────

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # ── Common ──────────────────────────────────────────────────────────────
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: Validation failed

    ValidationErrorResponse:
      type: object
      required: [error, details]
      properties:
        error:
          type: string
          example: Validation failed
        details:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
                example: email
              message:
                type: string
                example: Invalid email address

    # ── Auth ────────────────────────────────────────────────────────────────
    TokenPair:
      type: object
      required: [accessToken, refreshToken]
      properties:
        accessToken:
          type: string
          description: Short-lived JWT access token (default 15 min)
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        refreshToken:
          type: string
          description: Long-lived JWT refresh token (default 7 days)
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...

    SafeUser:
      type: object
      required: [id, email, firstName, lastName, role, createdAt, updatedAt]
      properties:
        id:
          type: string
          example: clxyz123abc
        email:
          type: string
          format: email
          example: alice@example.com
        firstName:
          type: string
          example: Alice
        lastName:
          type: string
          example: Smith
        role:
          type: string
          enum: [SYSTEM_ADMIN, ADMIN, USER]
          example: USER
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    TokenPayload:
      type: object
      required: [userId, email, role]
      properties:
        userId:
          type: string
          example: clxyz123abc
        email:
          type: string
          format: email
          example: alice@example.com
        role:
          type: string
          enum: [SYSTEM_ADMIN, ADMIN, USER]
          example: USER

    # ── Pagination ──────────────────────────────────────────────────────────
    PaginatedUsers:
      type: object
      required: [data, total, skip, take]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/SafeUser'
        total:
          type: integer
          example: 42
        skip:
          type: integer
          example: 0
        take:
          type: integer
          example: 10

# ─── Paths ───────────────────────────────────────────────────────────────────

paths:
  # ── Auth ────────────────────────────────────────────────────────────────────

  /auth/login:
    post:
      tags: [Auth]
      summary: Authenticate user
      description: |
        Validates email/password and returns an access token + refresh token pair.
        Tokens are signed JWTs. Store securely on the client.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: alice@example.com
                password:
                  type: string
                  example: SecurePass1
      responses:
        '200':
          description: Authenticated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/SafeUser'
                  tokens:
                    $ref: '#/components/schemas/TokenPair'
        '400':
          description: Validation error (invalid email format or missing fields)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '401':
          description: Invalid email or password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh token pair
      description: |
        Issues a new access + refresh token pair from a valid refresh token.
        The old refresh token is **invalidated** immediately (token rotation).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
                  example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
      responses:
        '200':
          description: New token pair issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  tokens:
                    $ref: '#/components/schemas/TokenPair'
        '400':
          description: Missing or empty refreshToken
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '401':
          description: Refresh token is expired, invalid, or already invalidated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout
      description: |
        Invalidates the provided refresh token. The access token will expire naturally.
        Requires a valid access token in the `Authorization` header.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
                  example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
      responses:
        '200':
          description: Logged out successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Logged out successfully
        '400':
          description: Missing or empty refreshToken
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '401':
          description: Access token missing or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/me:
    get:
      tags: [Auth]
      summary: Get current user
      description: Returns the authenticated user's JWT payload (userId, email, role).
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Authenticated user payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/TokenPayload'
        '401':
          description: Access token missing, expired, or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ── Users ────────────────────────────────────────────────────────────────────

  /users:
    post:
      tags: [Users]
      summary: Create a user
      description: |
        Creates a new user account.
        - `ADMIN` can only create accounts with `role: USER`.
        - `SYSTEM_ADMIN` can assign any role.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, firstName, lastName]
              properties:
                email:
                  type: string
                  format: email
                  example: bob@example.com
                password:
                  type: string
                  description: Min 8 chars, must contain uppercase, lowercase, and number
                  example: SecurePass1
                firstName:
                  type: string
                  example: Bob
                lastName:
                  type: string
                  example: Jones
                role:
                  type: string
                  enum: [SYSTEM_ADMIN, ADMIN, USER]
                  default: USER
                  example: USER
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/SafeUser'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Insufficient permissions or role escalation attempt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Email already in use
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      tags: [Users]
      summary: List users
      description: Returns a paginated list of users with optional filters.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: skip
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Number of records to skip
        - in: query
          name: take
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
          description: Number of records to return
        - in: query
          name: role
          schema:
            type: string
            enum: [SYSTEM_ADMIN, ADMIN, USER]
          description: Filter by role
        - in: query
          name: email
          schema:
            type: string
          description: Filter by email (contains)
        - in: query
          name: firstName
          schema:
            type: string
          description: Filter by first name (contains)
        - in: query
          name: lastName
          schema:
            type: string
          description: Filter by last name (contains)
      responses:
        '200':
          description: Paginated user list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedUsers'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Insufficient role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/{userId}:
    patch:
      tags: [Users]
      summary: Update a user
      description: |
        Partially updates a user's profile.
        - `ADMIN` cannot modify `SYSTEM_ADMIN` accounts or assign elevated roles.
        - `SYSTEM_ADMIN` has no restrictions.
        - Password is hashed automatically if provided.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
          description: Target user ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              minProperties: 1
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  description: Min 8 chars, must contain uppercase, lowercase, and number
                firstName:
                  type: string
                lastName:
                  type: string
                role:
                  type: string
                  enum: [SYSTEM_ADMIN, ADMIN, USER]
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/SafeUser'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags: [Users]
      summary: Delete a user
      description: |
        Permanently deletes a user by ID.
        `SYSTEM_ADMIN` accounts cannot be deleted.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
          description: Target user ID
      responses:
        '204':
          description: User deleted
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
